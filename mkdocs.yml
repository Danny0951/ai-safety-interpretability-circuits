      - 7 · Sparse Autoencoders: modules/07-sparse-autoencoders.md
      - 8 · Transcoders & Model Diffing: modules/08-transcoders-crosscoders.md
      - 9 · Attribution Graphs: modules/09-attribution-graphs.md
      - 10 · Reading Model Thoughts: modules/10-explanations-workspace.md
  - Safety & Research:
      - 11 · Steering & Editing: modules/11-steering.md
      - 12 · Safety Mechanisms: modules/12-safety-mechanisms.md
      - 13 · Auditing Hidden Behavior: modules/13-auditing.md
      - 14 · Research That Survives Contact: modules/14-research-rigor.md
      - 15 · Design a Novel Project: modules/15-project-design.md
  - Labs:
      - Lab Guide: labs/index.md
      - 0 · Environment: labs/00-environment.md
      - 1 · Activations & Attribution: labs/01-activation-cache.md
      - 2 · Activation Patching: labs/02-activation-patching.md
      - 3 · SAE Feature Validation: labs/03-sae-features.md
      - 4 · Circuit Tracer: labs/04-circuit-tracer.md
      - 5 · Jacobian Lens & NLA: labs/05-jacobian-lens.md
      - 6 · Harmless Safety Audit: labs/06-safety-audit.md
